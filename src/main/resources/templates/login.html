<!-- Login page template -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login | FILMOTOKIO</title>

  <!-- Bootstrap CSS framework -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS stylesheets -->
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">

  <!-- Font Awesome for icons -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<!-- Enhanced dark gradient background with animated particles effect -->
<body style="background: linear-gradient(135deg, #0a0a0a, #1a1a1a); min-height: 100vh; display:flex; align-items:center; justify-content:center; position: relative; overflow: hidden;">

<!-- Animated background particles -->
<div class="bg-particles">
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
</div>

<!-- Authentication card container -->
<div class="auth-card">

  <!-- Application title with branding -->
  <div class="auth-title">
    <div class="title-icon-container">
      <i class="fas fa-film title-icon"></i>
    </div>
    FILMO<span>TOKIO</span>
  </div>

  <!-- Enhanced success message display with icon -->
  <div th:if="${message}" class="alert alert-success enhanced-alert" role="alert">
    <i class="fas fa-check-circle alert-icon"></i>
    <span th:text="${message}"></span>
  </div>

  <!-- Enhanced error message display with icon -->
  <div th:if="${error}" class="alert alert-danger enhanced-alert" role="alert">
    <i class="fas fa-exclamation-triangle alert-icon"></i>
    <span th:text="${error}"></span>
  </div>

  <!-- Login form -->
  <form th:action="@{/login}" method="post" class="auth-form">
    <!-- CSRF filmotokio.security token -->
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    
    <!-- Enhanced username input field with icon -->
    <div class="input-group enhanced-input">
      <div class="input-icon">
        <i class="fas fa-user"></i>
      </div>
      <input type="text" name="username" class="form-control" placeholder="Username" required>
    </div>
    
    <!-- Enhanced password input field with icon -->
    <div class="input-group enhanced-input">
      <div class="input-icon">
        <i class="fas fa-lock"></i>
      </div>
      <input type="password" name="password" class="form-control" placeholder="Password" required>
    </div>
    
    <!-- Submit button -->
    <button type="submit" class="btn-auth">
      <i class="fas fa-sign-in-alt btn-icon"></i>
      <span>Sign In</span>
    </button>
  </form>

  <!-- Enhanced link to registration page with icon -->
  <a href="/register" class="auth-link">
    <i class="fas fa-user-plus link-icon"></i>
    <span>Don't have an account? Register</span>
  </a>

</div>

<!-- Bootstrap JavaScript bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom animations script -->
<script>
  // Particle animation
  document.addEventListener('DOMContentLoaded', function() {
    const particles = document.querySelectorAll('.particle');
    particles.forEach((particle, index) => {
      particle.style.animationDelay = `${index * 0.5}s`;
    });
    
    // Form input focus effects
    const inputs = document.querySelectorAll('.form-control');
    inputs.forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.classList.add('focused');
      });
      input.addEventListener('blur', function() {
        this.parentElement.classList.remove('focused');
      });
    });
  });
</script>

</body>
</html>
