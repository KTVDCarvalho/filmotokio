<!-- New person creation page template -->
<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Create Artist - FILMOTOKIO</title>

    <!-- Bootstrap CSS framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Custom CSS stylesheets -->
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/form.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>
<!-- Include the navigation bar fragment -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Enhanced main person creation form container -->
<div class="container enhanced-form-container">
    <!-- Enhanced page header with icon and decoration -->
    <div class="page-header">
        <div class="header-content">
            <div class="title-icon-container">
                <i class="fas fa-user-plus title-icon"></i>
            </div>
            <h2 class="page-title">Create New Artist</h2>
        </div>
        <div class="header-decoration"></div>
    </div>

    <!-- Success and error message displays -->
    <div th:if="${message}" class="alert alert-success enhanced-alert">
        <i class="fas fa-check-circle alert-icon"></i>
        <span th:text="${message}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger enhanced-alert">
        <i class="fas fa-exclamation-triangle alert-icon"></i>
        <span th:text="${error}"></span>
    </div>

    <!-- Enhanced person creation form -->
    <form th:action="@{/person/save}" method="post" class="enhanced-form">
        <!-- CSRF filmotokio.security token -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        
        <!-- Enhanced person name input with icon -->
        <div class="form-group enhanced-input-group">
            <label class="form-label enhanced-label">
                <i class="fas fa-user label-icon"></i>
                Name
            </label>
            <div class="input-wrapper">
                <input type="text" class="form-control enhanced-input" name="name" placeholder="Enter artist name" required>
                <div class="input-decoration"></div>
            </div>
        </div>

        <!-- Enhanced surname input with icon -->
        <div class="form-group enhanced-input-group">
            <label class="form-label enhanced-label">
                <i class="fas fa-user label-icon"></i>
                Surname
            </label>
            <div class="input-wrapper">
                <input type="text" class="form-control enhanced-input" name="surname" placeholder="Enter artist surname" required>
                <div class="input-decoration"></div>
            </div>
        </div>

        <!-- Enhanced type selection with icon -->
        <div class="form-group enhanced-input-group">
            <label class="form-label enhanced-label">
                <i class="fas fa-theater-masks label-icon"></i>
                Artist Type
            </label>
            <div class="select-wrapper">
                <select class="form-select enhanced-select" name="type" required>
                    <option value="" disabled selected>Select artist type</option>
                    <option th:each="type : ${T(filmotokio.domain.TypePersonEnum).values()}"
                            th:value="${type}" th:text="${type}"></option>
                </select>
                <div class="select-decoration"></div>
            </div>
        </div>

        <!-- Submit button -->
        <div class="form-actions">
            <button type="submit" class="btn-submit enhanced-btn">
                <div class="btn-content">
                    <i class="fas fa-user-plus btn-icon"></i>
                    <span>Create Artist</span>
                </div>
                <div class="btn-decoration"></div>
            </button>
        </div>
    </form>
</div>

<!-- Enhanced spacer -->
<div class="mt-auto enhanced-spacer">
    <div class="spacer-decoration"></div>
</div>

<!-- Footer -->
<div th:replace="~{fragments/footer :: siteFooter}"></div>

<!-- Bootstrap JavaScript bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Enhanced form interactions script -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const inputs = document.querySelectorAll('.enhanced-input');
        const select = document.querySelector('.enhanced-select');
        const submitBtn = document.querySelector('.enhanced-btn');
        
        // Input focus effects
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.classList.remove('focused');
            });
        });
        
        // Select focus effects
        if (select) {
            select.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            select.addEventListener('blur', function() {
                this.parentElement.classList.remove('focused');
            });
        }
        
        // Button hover effects
        if (submitBtn) {
            submitBtn.addEventListener('mouseenter', function() {
                this.querySelector('.btn-decoration').style.width = '100%';
            });
            
            submitBtn.addEventListener('mouseleave', function() {
                this.querySelector('.btn-decoration').style.width = '0%';
            });
            
            // Form submission animation
            this.querySelector('form').addEventListener('submit', function() {
                submitBtn.classList.add('submitting');
                submitBtn.querySelector('.btn-icon').className = 'fas fa-spinner fa-spin btn-icon';
            });
        }
    });
</script>

</body>
</html>
