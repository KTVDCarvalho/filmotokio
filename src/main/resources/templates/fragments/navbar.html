<nav th:fragment="navbar" class="navbar" xmlns:th="http://www.thymeleaf.org">

    <div class="logo">FILMO<span>TOKIO</span></div>

    <div class="nav-links">
        <a href="/" class="nav-link">
            <i class="fas fa-home nav-icon"></i>
            <span>Home</span>
        </a>

        <a href="/film/new"
           th:if="${#authorization != null and #authorization.expression('isAuthenticated()')}"
           class="nav-link">
            <i class="fas fa-film nav-icon"></i>
            <span>New Film</span>
        </a>

        <a href="/film/search" class="nav-link">
            <i class="fas fa-search nav-icon"></i>
            <span>Search Film</span>
        </a>

        <a href="/person/new"
           th:if="${#authorization != null and #authorization.expression('isAuthenticated()')}"
           class="nav-link">
            <i class="fas fa-user-plus nav-icon"></i>
            <span>Create Person</span>
        </a>

        <a href="/admin/user/new"
           th:if="${#authorization != null and #authorization.expression('hasRole(\'ADMIN\')')}"
           class="nav-link">
            <i class="fas fa-user-shield nav-icon"></i>
            <span>Create User</span>
        </a>

        <a href="/login"
           th:if="${#authorization == null or #authorization.expression('isAnonymous()')}"
           class="nav-link">
            <i class="fas fa-sign-in-alt nav-icon"></i>
            <span>Login</span>
        </a>
    </div>

    <div class="user-info" th:if="${#authorization != null and #authorization.expression('isAuthenticated()')}">
        <span>Hello, <strong th:text="${#authentication.name}"></strong></span>

        <div class="dropdown">
            <a href="#" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="navbar-profile-pic">
                    <img th:if="${#httpServletRequest.userPrincipal != null and @userRepository.findByUsername(#httpServletRequest.userPrincipal.name).orElse(null) != null and @userRepository.findByUsername(#httpServletRequest.userPrincipal.name).get().image != null}"
                         th:src="${@userRepository.findByUsername(#httpServletRequest.userPrincipal.name).get().image}"
                         alt="Profile" class="profile-img">

                    <i th:unless="${#httpServletRequest.userPrincipal != null and @userRepository.findByUsername(#httpServletRequest.userPrincipal.name).orElse(null) != null and @userRepository.findByUsername(#httpServletRequest.userPrincipal.name).get().image != null}"
                       class="fas fa-user"></i>
                </div>
                <i class="fas fa-chevron-down dropdown-arrow"></i>
            </a>

            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                <li><a class="dropdown-item" th:href="@{/profile}">
                    <i class="fas fa-user-circle me-2"></i>Profile
                </a></li>

                <li th:if="${#authorization.expression('hasRole(\'ADMIN\')')}">
                    <a class="dropdown-item" th:href="@{/admin/migration}">
                        <i class="fas fa-database me-2"></i>Migrate
                    </a>
                </li>

                <li><hr class="dropdown-divider"></li>

                <li>
                    <form th:action="@{/logout}" method="post">
                        <button class="dropdown-item" type="submit">
                            <i class="fas fa-sign-out-alt me-2"></i>Sign Out
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>

</nav>
