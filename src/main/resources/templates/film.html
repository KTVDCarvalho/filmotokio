<!-- Film details page template -->
<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <!-- Dynamic page title with film name -->
    <title th:text="${film.title} + ' - FILMOTOKIO'">FILMOTOKIO</title>

    <!-- Bootstrap CSS framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Custom CSS stylesheets -->
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/film.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>

<!-- Include the navigation bar fragment -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Main film page content -->
<div class="container-film">

    <!-- Success and error message displays -->
    <div th:if="${successMessage}" class="alert alert-success enhanced-alert" th:text="${successMessage}">
        <i class="fas fa-check-circle alert-icon"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger enhanced-alert" th:text="${errorMessage}">
        <i class="fas fa-exclamation-triangle alert-icon"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Film details section -->
    <div class="d-flex mb-4 position-relative film-details-container">
        <!-- Film poster image -->
        <div class="poster-container">
            <img th:src="${film.poster != null ? film.poster : '/images/default-poster.svg'}" alt="Poster" class="poster">
            <!-- Poster overlay with hover effect -->
            <div class="poster-overlay">
                <div class="overlay-content">
                    <i class="fas fa-play-circle overlay-icon"></i>
                    <span class="overlay-text">View Details</span>
                </div>
            </div>
        </div>

        <!-- Enhanced average rating display overlaid on poster -->
        <div class="film-average enhanced-rating">
            <div class="rating-label">
                <i class="fas fa-star rating-label-icon"></i>
                <span>Rating</span>
            </div>
            <!-- Generate 5 stars with appropriate classes based on average rating -->
            <div class="stars-container">
                <span th:each="i : ${#numbers.sequence(1,5)}"
                      th:classappend="${T(filmotokio.util.StarRatingUtil).getStarClass(averageScore, i)}"
                      class="star">
                    &#9733;
                </span>
            </div>
            <!-- Display numeric average rating -->
            <div class="rating-value">
                <span class="avg-number" th:text="${#numbers.formatDecimal(averageScore,1,1)}">0</span>
            </div>
        </div>

        <!-- Film information -->
        <div class="film-info-container">
            <!-- Film title -->
            <div class="film-title-section">
                <i class="fas fa-film title-icon"></i>
                <h2 th:text="${film.title}"></h2>
            </div>
            
            <!-- Film basic details -->
            <div class="film-meta">
                <div class="meta-item">
                    <i class="fas fa-calendar meta-icon"></i>
                    <span>Year:</span>
                    <span th:text="${film.year}" class="meta-value"></span>
                </div>
                <div class="meta-divider">•</div>
                <div class="meta-item">
                    <i class="fas fa-clock meta-icon"></i>
                    <span>Duration:</span>
                    <span th:text="${film.duration}" class="meta-value"></span>
                    <span class="meta-unit">min</span>
                </div>
            </div>
            
            <!-- Film synopsis -->
            <div class="synopsis-section">
                <div class="section-header">
                    <i class="fas fa-align-left section-icon"></i>
                    <h5>Synopsis</h5>
                </div>
                <p th:text="${film.synopsis}" class="synopsis-text"></p>
            </div>

            <!-- Film cast information -->
            <div class="cast-section">
                <div class="section-header">
                    <i class="fas fa-users section-icon"></i>
                    <h5>Cast & Crew</h5>
                </div>

                <!-- Enhanced screenwriters section -->
                <div class="cast-category">
                    <div class="category-header">
                        <i class="fas fa-pen category-icon"></i>
                        <strong>Screenwriters:</strong>
                    </div>
                    <div class="category-content">
                        <span th:if="${!film.screenwriters.isEmpty()}" class="cast-list">
                            <!-- Loop through screenwriters and display names -->
                            <span th:each="person, stat : ${film.screenwriters}" class="cast-member">
                                <i class="fas fa-user member-icon"></i>
                                <span th:text="${person.name + ' ' + person.surname}"></span>
                                <span th:if="${!stat.last}" class="separator">,</span>
                            </span>
                        </span>
                        <!-- Show message if no screenwriters are listed -->
                        <div th:if="${film.screenwriters.isEmpty()}" class="empty-state">
                            <i class="fas fa-minus-circle empty-icon"></i>
                            Not specified
                        </div>
                    </div>
                </div>

                <!-- Enhanced actors section -->
                <div class="cast-category">
                    <div class="category-header">
                        <i class="fas fa-theater-masks category-icon"></i>
                        <strong>Actors:</strong>
                    </div>
                    <div class="category-content">
                        <span th:if="${!film.actors.isEmpty()}" class="cast-list">
                            <!-- Loop through actors and display names -->
                            <span th:each="person, stat : ${film.actors}" class="cast-member">
                                <i class="fas fa-user member-icon"></i>
                                <span th:text="${person.name + ' ' + person.surname}"></span>
                                <span th:if="${!stat.last}" class="separator">,</span>
                            </span>
                        </span>
                        <!-- Show message if no actors are listed -->
                        <div th:if="${film.actors.isEmpty()}" class="empty-state">
                            <i class="fas fa-minus-circle empty-icon"></i>
                            Not specified
                        </div>
                    </div>
                </div>

                <!-- Enhanced musicians section -->
                <div class="cast-category">
                    <div class="category-header">
                        <i class="fas fa-music category-icon"></i>
                        <strong>Musicians:</strong>
                    </div>
                    <div class="category-content">
                        <span th:if="${!film.musicians.isEmpty()}" class="cast-list">
                            <!-- Loop through musicians and display names -->
                            <span th:each="person, stat : ${film.musicians}" class="cast-member">
                                <i class="fas fa-user member-icon"></i>
                                <span th:text="${person.name + ' ' + person.surname}"></span>
                                <span th:if="${!stat.last}" class="separator">,</span>
                            </span>
                        </span>
                        <!-- Show message if no musicians are listed -->
                        <div th:if="${film.musicians.isEmpty()}" class="empty-state">
                            <i class="fas fa-minus-circle empty-icon"></i>
                            Not specified
                        </div>
                    </div>
                </div>

                <!-- Enhanced directors -->
                <div class="cast-category">
                    <div class="category-header">
                        <i class="fas fa-video category-icon"></i>
                        <strong>Directors:</strong>
                    </div>
                    <div class="category-content">
                        <span th:if="${!film.directors.isEmpty()}" class="cast-list">
                            <span th:each="person, stat : ${film.directors}" class="cast-member">
                                <i class="fas fa-user member-icon"></i>
                                <span th:text="${person.name + ' ' + person.surname}"></span>
                                <span th:if="${!stat.last}" class="separator">,</span>
                            </span>
                        </span>
                        <div th:if="${film.directors.isEmpty()}" class="empty-state">
                            <i class="fas fa-minus-circle empty-icon"></i>
                            Not specified
                        </div>
                    </div>
                </div>

                <!-- Enhanced photographers -->
                <div class="cast-category">
                    <div class="category-header">
                        <i class="fas fa-camera category-icon"></i>
                        <strong>Photographers:</strong>
                    </div>
                    <div class="category-content">
                        <span th:if="${!film.photographers.isEmpty()}" class="cast-list">
                            <span th:each="person, stat : ${film.photographers}" class="cast-member">
                                <i class="fas fa-user member-icon"></i>
                                <span th:text="${person.name + ' ' + person.surname}"></span>
                                <span th:if="${!stat.last}" class="separator">,</span>
                            </span>
                        </span>
                        <div th:if="${film.photographers.isEmpty()}" class="empty-state">
                            <i class="fas fa-minus-circle empty-icon"></i>
                            Not specified
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Enhanced Film Rating Section -->
    <div class="rating-section enhanced-section">
        <div class="section-header">
            <i class="fas fa-star section-icon"></i>
            <h5>Rate this film:</h5>
        </div>
        <form th:action="@{/films/{id}/score(id=${film.id})}" method="post" class="star-rating enhanced-star-rating">
            <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="star-input-group">
                <input type="radio" name="value" id="star5" value="5" th:checked="${userScore == 5}" class="star-radio">
                <label for="star5" class="star-label">
                    <i class="fas fa-star star-icon"></i>
                </label>

                <input type="radio" name="value" id="star4" value="4" th:checked="${userScore == 4}" class="star-radio">
                <label for="star4" class="star-label">
                    <i class="fas fa-star star-icon"></i>
                </label>

                <input type="radio" name="value" id="star3" value="3" th:checked="${userScore == 3}" class="star-radio">
                <label for="star3" class="star-label">
                    <i class="fas fa-star star-icon"></i>
                </label>

                <input type="radio" name="value" id="star2" value="2" th:checked="${userScore == 2}" class="star-radio">
                <label for="star2" class="star-label">
                    <i class="fas fa-star star-icon"></i>
                </label>

                <input type="radio" name="value" id="star1" value="1" th:checked="${userScore == 1}" class="star-radio">
                <label for="star1" class="star-label">
                    <i class="fas fa-star star-icon"></i>
                </label>
            </div>
        </form>
    </div>

    <!-- Enhanced Delete Button (Admin) -->
    <div class="delete-section enhanced-section" sec:authorize="hasRole('ADMIN')">
        <div class="section-header">
            <i class="fas fa-trash section-icon danger-icon"></i>
            <h5>Admin Actions:</h5>
        </div>
        <form th:action="@{/films/delete/{id}(id=${film.id})}" method="post"
              onsubmit="return confirm('Are you sure you want to delete this film? This action is irreversible.');" class="delete-form">
            <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn-action btn-delete">
                <i class="fas fa-trash btn-icon"></i>
                <span>Delete Film</span>
            </button>
        </form>
    </div>

    <!-- Enhanced Review Form -->
    <div th:if="${!userHasReviewed}" class="review-form-section enhanced-section">
        <div class="section-header">
            <i class="fas fa-comment-dots section-icon"></i>
            <h5>Write a Review:</h5>
        </div>
        <form th:action="@{/films/{id}/review(id=${film.id})}" method="post"
              onsubmit="this.querySelector('button[type=submit]').disabled = true;" class="review-form enhanced-form">
            <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="form-group enhanced-input-group">
                <label class="form-label enhanced-label">
                    <i class="fas fa-heading label-icon"></i>
                    Review Title
                </label>
                <input type="text" name="title" class="form-control enhanced-input" placeholder="Enter your review title" required>
            </div>
            <div class="form-group enhanced-input-group">
                <label class="form-label enhanced-label">
                    <i class="fas fa-align-left label-icon"></i>
                    Your Review
                </label>
                <textarea name="textReview" rows="4" class="form-control enhanced-input" placeholder="Share your thoughts about this film" required></textarea>
            </div>
            <button type="submit" class="btn-action btn-submit">
                <i class="fas fa-paper-plane btn-icon"></i>
                <span>Submit Review</span>
            </button>
        </form>
    </div>

    <!-- Enhanced Reviews Section -->
    <div class="reviews-section enhanced-section">
        <div class="section-header">
            <i class="fas fa-comments section-icon"></i>
            <h4>User Reviews</h4>
        </div>
        <div th:each="review : ${reviews}" class="review-card enhanced-review-card">
            <div class="review-header">
                <div class="reviewer-info">
                    <div class="reviewer-avatar">
                        <img th:src="${review.user.image != null ? review.user.image : '/images/default-avatar.svg'}" 
                             th:alt="${review.user.name + ' ' + review.user.surname}" 
                             class="avatar-img"
                             onerror="this.src='/images/default-avatar.svg'">
                    </div>
                    <div class="reviewer-details">
                        <strong class="reviewer-name" th:text="${review.user.name + ' ' + review.user.surname}"></strong>
                        <div class="review-date">
                            <i class="fas fa-calendar-alt date-icon"></i>
                            <span th:text="${#temporals.format(review.date, 'dd/MM/yyyy')}"></span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="review-content">
                <h5 class="review-title" th:text="${review.title}"></h5>
                <p class="review-text" th:text="${review.textReview}"></p>
            </div>
        </div>
    </div>

</div>

<!-- Footer -->
<div th:replace="~{fragments/footer :: siteFooter}"></div>

<!-- Enhanced Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('.star-rating input').forEach(input => {
        input.addEventListener('change', function () {
            this.form.submit();
        });
    });
    
    // Enhanced hover effects for stars
    document.querySelectorAll('.star-label').forEach((label, index) => {
        label.addEventListener('mouseenter', function() {
            const stars = document.querySelectorAll('.star-icon');
            for(let i = 0; i <= index; i++) {
                stars[i].style.color = '#ff6a00';
                stars[i].style.transform = 'scale(1.2)';
            }
        });
        
        label.addEventListener('mouseleave', function() {
            const stars = document.querySelectorAll('.star-icon');
            stars.forEach(star => {
                star.style.color = '';
                star.style.transform = '';
            });
        });
    });
    
    // Poster overlay hover effect
    const posterContainer = document.querySelector('.poster-container');
    if(posterContainer) {
        posterContainer.addEventListener('mouseenter', function() {
            this.querySelector('.poster-overlay').style.opacity = '1';
        });
        posterContainer.addEventListener('mouseleave', function() {
            this.querySelector('.poster-overlay').style.opacity = '0';
        });
    }
</script>

</body>
</html>
