<!-- Error page template -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error | FILMOTOKIO</title>

    <!-- Bootstrap CSS framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS stylesheets -->
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/error.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

<!-- Include the navigation bar fragment -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Main error display section -->
<div class="enhanced-error-container">
    <!-- Error visual -->
    <div class="error-visual">
        <div class="error-icon-container">
            <i class="fas fa-exclamation-triangle error-icon"></i>
        </div>
        <div class="error-background-effects">
            <div class="error-circle error-circle-1"></div>
            <div class="error-circle error-circle-2"></div>
            <div class="error-circle error-circle-3"></div>
        </div>
    </div>
    
    <!-- Error content -->
    <div class="error-content">
        <!-- Display HTTP status code -->
        <div class="error-code-container">
            <div class="error-code" th:text="${statusCode != null ? statusCode : '404'}">404</div>
            <div class="error-code-label">Error Code</div>
        </div>
        
        <!-- Error message -->
        <div class="error-message">
            <div class="message-icon-container">
                <i class="fas fa-info-circle message-icon"></i>
            </div>
            <div class="message-text">
                <!-- Show custom error message if available, otherwise show default message -->
                <span th:if="${errorMessage}" th:text="${errorMessage}">The film you are looking for is not available.</span>
                <span th:unless="${errorMessage}">The film you are looking for is not available.</span>
            </div>
        </div>
        
        <!-- Error details -->
        <div th:if="${error}" class="error-details enhanced-details">
            <div class="details-header">
                <i class="fas fa-bug details-icon"></i>
                <span>Technical Details</span>
            </div>
            <div class="details-content">
                <small class="details-text" th:text="${error.message}"></small>
            </div>
        </div>
        
        <!-- Action buttons -->
        <div class="error-actions">
            <a href="/" class="btn-back-home enhanced-btn-primary">
                <div class="btn-content">
                    <i class="fas fa-home btn-icon"></i>
                    <span>Back to Home</span>
                </div>
                <div class="btn-decoration"></div>
            </a>
            <button class="btn-reload enhanced-btn-secondary" onclick="history.back()">
                <div class="btn-content">
                    <i class="fas fa-arrow-left btn-icon"></i>
                    <span>Go Back</span>
                </div>
                <div class="btn-decoration"></div>
            </button>
        </div>
        
        <!-- Help suggestions -->
        <div class="error-suggestions">
            <div class="suggestions-header">
                <i class="fas fa-lightbulb suggestions-icon"></i>
                <span>Suggestions:</span>
            </div>
            <ul class="suggestions-list">
                <li class="suggestion-item">
                    <i class="fas fa-check suggestion-check"></i>
                    <span>Check the URL for typos</span>
                </li>
                <li class="suggestion-item">
                    <i class="fas fa-check suggestion-check"></i>
                    <span>Try searching for the film</span>
                </li>
                <li class="suggestion-item">
                    <i class="fas fa-check suggestion-check"></i>
                    <span>Return to the home page</span>
                </li>
            </ul>
        </div>
    </div>
</div>

<!-- Spacer -->
<div class="mt-auto enhanced-spacer">
    <div class="spacer-decoration"></div>
</div>

<!-- Include the footer fragment -->
<div th:replace="~{fragments/footer :: siteFooter}"></div>

<!-- Bootstrap JavaScript bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Error page interactions -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Animate error elements on load
        const errorContainer = document.querySelector('.enhanced-error-container');
        const errorIcon = document.querySelector('.error-icon');
        const errorCode = document.querySelector('.error-code');
        const suggestions = document.querySelectorAll('.suggestion-item');
        
        // Animate container appearance
        errorContainer.style.opacity = '0';
        errorContainer.style.transform = 'translateY(30px)';
        
        setTimeout(() => {
            errorContainer.style.transition = 'all 0.6s ease-out';
            errorContainer.style.opacity = '1';
            errorContainer.style.transform = 'translateY(0)';
        }, 100);
        
        // Animate error icon
        if (errorIcon) {
            errorIcon.style.animation = 'pulse 2s infinite';
        }
        
        // Animate error code
        if (errorCode) {
            errorCode.style.animation = 'glow 2s infinite alternate';
        }
        
        // Animate suggestions with delay
        suggestions.forEach((item, index) => {
            item.style.opacity = '0';
            item.style.transform = 'translateX(-20px)';
            
            setTimeout(() => {
                item.style.transition = 'all 0.4s ease-out';
                item.style.opacity = '1';
                item.style.transform = 'translateX(0)';
            }, 800 + (index * 100));
        });
        
        // Button hover effects
        const buttons = document.querySelectorAll('.enhanced-btn-primary, .enhanced-btn-secondary');
        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', function() {
                this.querySelector('.btn-decoration').style.width = '100%';
            });
            
            btn.addEventListener('mouseleave', function() {
                this.querySelector('.btn-decoration').style.width = '0%';
            });
        });
        
        // Animate background circles
        const circles = document.querySelectorAll('.error-circle');
        circles.forEach((circle, index) => {
            circle.style.animation = `float ${3 + index}s ease-in-out infinite`;
        });
    });
</script>

</body>
</html>
