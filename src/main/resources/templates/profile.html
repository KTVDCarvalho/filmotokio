<!-- User profile page template - displays and manages user information -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile | FILMOTOKIO</title>

    <!-- Bootstrap CSS framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Custom CSS stylesheets -->
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>
<!-- Include the navigation bar fragment -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Main profile container -->
<div class="profile-container">

    <!-- Success and error message displays -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Profile header section with photo and basic info -->
    <div class="profile-header">
        <!-- Profile photo container with upload button -->
        <div class="profile-photo-container">
            <!-- User profile picture or default image -->
            <img th:src="${user.image != null ? user.image : '/images/default-avatar.svg'}" alt="Profile Image" class="profile-photo">
            <!-- Button to upload new profile photo -->
            <button type="button" class="btn-upload-photo" data-bs-toggle="modal" data-bs-target="#uploadPhotoModal">
                <i class="fas fa-camera"></i>
            </button>
            <!-- Profile photo overlay effect -->
            <div class="profile-photo-overlay">
                <i class="fas fa-camera overlay-icon"></i>
            </div>
        </div>
        <!-- User name and role display -->
        <div class="profile-user-info">
            <!-- Full name with icon -->
            <div class="profile-name">
                <i class="fas fa-user-circle name-icon"></i>
                <h2 th:text="${user.name + ' ' + user.surname}">Name Surname</h2>
            </div>
            <!-- User role with badge -->
            <div class="profile-role">
                <i class="fas fa-shield-alt role-icon"></i>
                <span class="role-badge" th:text="${user.role}">ADMIN</span>
            </div>
        </div>
    </div>

    <!-- Detailed profile information -->
    <div class="profile-info">
        <!-- Username display -->
        <div class="info-item">
            <div class="info-label">
                <i class="fas fa-at label-icon"></i>
                <span>Username</span>
            </div>
            <div class="info-value" th:text="${user.username}">username</div>
        </div>
        
        <!-- Email address display -->
        <div class="info-item">
            <div class="info-label">
                <i class="fas fa-envelope label-icon"></i>
                <span>Email</span>
            </div>
            <div class="info-value" th:text="${user.email}">email@example.com</div>
        </div>
        
        <!-- Birth date formatted for display -->
        <div class="info-item">
            <div class="info-label">
                <i class="fas fa-birthday-cake label-icon"></i>
                <span>Birth Date</span>
            </div>
            <div class="info-value" th:text="${#temporals.format(user.birthDate, 'MM/dd/yyyy')}">01/01/2000</div>
        </div>
        
        <!-- Account creation date formatted for display -->
        <div class="info-item">
            <div class="info-label">
                <i class="fas fa-calendar-plus label-icon"></i>
                <span>Creation Date</span>
            </div>
            <div class="info-value" th:text="${#temporals.format(user.creationDate, 'MM/dd/yyyy')}">01/01/2026</div>
        </div>
        
        <!-- Last login date -->
        <div class="info-item">
            <div class="info-label">
                <i class="fas fa-clock label-icon"></i>
                <span>Last Login</span>
            </div>
            <div class="info-value" th:text="${user.lastLoginDate != null ? #temporals.format(user.lastLoginDate, 'MM/dd/yyyy HH:mm') : 'Never'}">Never</div>
        </div>
        
        <!-- Account status -->
        <div class="info-item">
            <div class="info-label">
                <i class="fas fa-toggle-on label-icon"></i>
                <span>Status</span>
            </div>
            <div class="info-value">
                <span class="status-badge" 
                      th:classappend="${user.active ? 'status-active' : 'status-inactive'}"
                      th:text="${user.active ? 'Active' : 'Inactive'}">Active</span>
            </div>
        </div>
    </div>
</div>

<!-- Upload Photo Modal -->
<div class="modal fade" id="uploadPhotoModal" tabindex="-1" aria-labelledby="uploadPhotoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="uploadPhotoModalLabel">
                    <i class="fas fa-camera me-2"></i>Update Profile Photo
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/profile/upload-photo}" method="post" enctype="multipart/form-data">
                <div class="modal-body">
                    <div class="upload-area">
                        <div class="upload-icon">
                            <i class="fas fa-cloud-upload-alt"></i>
                        </div>
                        <div class="upload-text">
                            <h6>Choose a photo</h6>
                            <p>Click to browse or drag and drop</p>
                        </div>
                        <div class="mb-3">
                            <label for="photo" class="form-label">
                                <i class="fas fa-image me-2"></i>Select a photo:
                            </label>
                            <input type="file" class="form-control" id="photo" name="photo" accept="image/*" required>
                            <div class="form-text">
                                <i class="fas fa-info-circle me-1"></i>
                                Only image files (JPG, PNG, GIF) are allowed. Maximum size: 10MB.
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times me-2"></i>Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-upload me-2"></i>Upload
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Footer -->
<div th:replace="~{fragments/footer :: siteFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
