spring.application.name=FILMOTOKIO

# Database Configuration - H2 Database (File-based for Render)
spring.datasource.url=jdbc:h2:file:./data/filmotokio;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate settings - Auto-create tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server tweaks
server.tomcat.max-swallow-size=20000
spring.webflux.multipart.max-in-memory-size=20000
server.tomcat.max-parameters=1000
server.tomcat.max-http-form-post-size=100000

# Circular references fix
spring.main.allow-circular-references=true

# JWT Configuration (Using the fallback safe values we defined in code)
jwt.secret=MinhaChaveSecretaSuperSeguraComMaisDe32Caracteres
jwt.expiration=18000000

# Spring Batch settings - CRITICAL FIX FOR YOUR ERROR
spring.batch.job.enabled=true
spring.batch.initialize-schema=always
spring.batch.jdbc.isolation-level-for-create=default